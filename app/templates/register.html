{% extends "base.html" %}
{% block title %}Create Account - TaskFlow{% endblock %}

{% block content %}
<div class="auth-wrapper animate-fade-in">
    <div class="auth-card glassmorphic">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h2>Create Account</h2>
            <p class="auth-subtitle">Get started with TaskFlow today</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" name="username" id="username" placeholder="Choose a username" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" name="password" id="password" placeholder="Create a strong password" required autocomplete="new-password">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <span>Register</span>
                <i class="fa-solid fa-user-plus"></i>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}" class="auth-link">Sign In here</a></p>
        </div>
    </div>
</div>
{% endblock %}
