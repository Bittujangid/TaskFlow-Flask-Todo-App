{% extends "base.html" %}
{% block title %}Sign In - TaskFlow{% endblock %}

{% block content %}
<div class="auth-wrapper animate-fade-in">
    <div class="auth-card glassmorphic">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fa-solid fa-square-check"></i>
            </div>
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Sign in to your TaskFlow account</p>
        </div>
        
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-user input-icon"></i>
                    <input type="text" name="username" id="username" placeholder="Enter your username" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-icon-wrapper">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" name="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <span>Sign In</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.register') }}" class="auth-link">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
